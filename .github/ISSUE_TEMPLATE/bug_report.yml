name: Bug report
description: Report reproducible behavior that is not working as expected
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include private audio, images, tokens, or other sensitive data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Visual mode
      options:
        - 3D Visualizer
        - Wave Visualizer
        - Image FX
        - Live / VJ
        - MP4 export
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open...
        2. Upload...
        3. Select...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 136, Firefox 138, Safari 18, etc.
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04, etc.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove personal paths, media, credentials, and tokens before posting.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I can reproduce this with the current live demo or the latest `main` branch.
          required: true
